services:
  mlflow:
    image: burakince/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./logs/mlflow:/opt/mlflow
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]

