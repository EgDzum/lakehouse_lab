services:
  mlflow:
    image: burakince/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./logs/mlflow:/opt/mlflow
    command: [
      "mlflow", "server", "--host", "0.0.0.0", "--port", 
      "5000", "--allowed-hosts", "*"
      ]

  app:
    build: .
    depends_on:
      - mlflow
    volumes:
      - ./data:/app/storage
      - ./raw_data:/app/raw_data
      - ./logs/app:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python src/main.py